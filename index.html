<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- 
    ======================================================================
    更新版本紀錄 (Changelog)
    ======================================================================
    [v1.2.8] 2026-05-04
    - 重大修正：恢復完整表單送出、報價計算、行李限制等核心邏輯，修復地址無法回傳試算表的問題。
    - 同步版本號至 v1.2.8。
    [v1.2.4] 2026-05-04
    - 移除自動將換行轉換為 `<br>` 的邏輯，允許管理者在 GAS「最新消息」中直接撰寫完整 HTML 以精確控制排版。
    [v1.2.3] 2026-05-04
    - 效能優化：恢復非同步讀取報價與公告，解決「系統載入中...」畫面停留過久的問題。
    [v1.1.0] 2026-05-04
    - 調整安全座椅顯示邏輯：4歲以下(強制)與4-12歲(選配)皆會顯示加購選單。
    ======================================================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安興租車預約/詢價 系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAxYym5ZR8puPb0iiycHdwzTJTKH0Aears&libraries=places&callback=initMapAutocomplete"></script>

    <style>
        :root { --primary: #553f62; --secondary: #9ca3af; --accent: #f07cad; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .border-primary { border-color: var(--primary); }
        .focus-primary:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(85, 63, 98, 0.2); }
        .swal-custom-radius { border-radius: 20px !important; }
        input[type="radio"]:checked { background-color: var(--primary); border-color: var(--primary); }
        input[type="checkbox"]:checked { background-color: var(--primary); border-color: var(--primary); }
        .order-id-font { font-family: 'Courier New', Courier, monospace; }
        #detailsContent { transition: max-height 0.3s ease-out; overflow: hidden; }
        input[type="checkbox"]:disabled { cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <div class="max-w-2xl mx-auto pt-4 px-4">
        <img src="預約單表頭.jpg" alt="安興租車預約/詢價 系統" class="w-full h-auto rounded-xl shadow-md" onerror="this.style.display='none'; document.getElementById('text-header').style.display='block';">
        <div id="text-header" class="bg-primary text-white text-center py-4 rounded-xl shadow-md" style="display: none;">
            <h1 class="text-xl font-bold tracking-wider">安興租車預約/詢價 系統</h1>
        </div>
    </div>

    <!-- Form Container -->
    <div id="formContainer" class="max-w-2xl mx-auto mt-4 px-4 hidden">
        <div class="bg-[#fff5f8] px-4 py-2 mb-4 rounded-lg flex justify-between items-center">
            <span class="text-xs font-bold text-[#f07cad] tracking-wider">預約編號</span>
            <span id="displayOrderId" class="text-sm font-black text-[#f07cad] order-id-font tracking-tight">AS-產生中...</span>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-4 space-y-6">
            <form id="bookingForm" class="space-y-6">
                <input type="hidden" id="sysLineId" name="sysLineId">
                <input type="hidden" id="sysLineName" name="sysLineName">
                <input type="hidden" id="orderId" name="orderId">
                
                <!-- 訂車人 -->
                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="text-lg font-bold text-primary mb-4 flex items-center">
                        <span class="w-1 h-5 bg-primary mr-2 inline-block rounded"></span>訂車人資訊
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">聯絡電話</label>
                            <input type="tel" id="ordererPhone" maxlength="12" class="mt-1 w-full p-2 border rounded focus-primary" placeholder="0900-000-000">
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-700">真實姓名</label>
                                <input type="text" id="ordererName" class="mt-1 w-full p-2 border rounded focus-primary">
                            </div>
                            <div class="col-span-1">
                                <label class="block text-sm font-medium text-gray-700">稱謂</label>
                                <select id="ordererTitle" class="mt-1 w-full p-2 border rounded focus-primary">
                                    <option value="先生">先生</option><option value="小姐">小姐</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">電子信箱 (MAIL)</label>
                            <input type="email" id="email" class="mt-1 w-full p-2 border rounded focus-primary">
                        </div>
                    </div>
                </div>

                <!-- 乘車人 -->
                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-primary flex items-center"><span class="w-1 h-5 bg-primary mr-2 inline-block rounded"></span>乘車人資訊</h2>
                        <label class="flex items-center space-x-1 cursor-pointer bg-white px-2 py-1 rounded border border-gray-300 text-xs shadow-sm hover:bg-gray-100">
                            <input type="checkbox" id="sameAsOrderer" class="rounded w-3 h-3">
                            <span class="font-bold">同訂車人資訊</span>
                        </label>
                    </div>
                    <div class="space-y-4">
                        <div class="grid grid-cols-3 gap-3">
                            <div class="col-span-2"><input type="text" id="paxName" class="w-full p-2 border rounded focus-primary" placeholder="乘車人姓名"></div>
                            <div class="col-span-1"><select id="paxTitle" class="w-full p-2 border rounded focus-primary"><option value="先生">先生</option><option value="小姐">小姐</option></select></div>
                        </div>
                        <input type="tel" id="paxPhone" maxlength="12" class="w-full p-2 border rounded focus-primary" placeholder="聯絡電話">
                    </div>
                </div>

                <!-- 行程 -->
                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="text-lg font-bold text-primary mb-4 flex items-center"><span class="w-1 h-5 bg-primary mr-2 inline-block rounded"></span>行程資訊</h2>
                    <div class="grid grid-cols-1 gap-4">
                        <div><label class="text-sm font-medium">乘車日期</label><input type="date" id="rideDate" class="w-full p-2 border rounded focus-primary quote-trigger"></div>
                        <div class="flex space-x-2">
                            <select id="rideHour" class="w-1/2 p-2 border rounded focus-primary quote-trigger"></select>
                            <select id="rideMinute" class="w-1/2 p-2 border rounded focus-primary quote-trigger"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="rideType" class="p-2 border rounded focus-primary quote-trigger"><option value="送機">送機</option><option value="接機">接機 (+$200)</option></select>
                            <select id="airport" class="p-2 border rounded focus-primary quote-trigger"><option value="桃園機場">桃園機場</option><option value="松山機場">松山機場</option><option value="台中機場">台中機場</option></select>
                        </div>
                        <input type="text" id="flightNo" class="w-full p-2 border rounded focus-primary uppercase" placeholder="航班編號">
                        <input type="text" id="zipcode" readonly class="w-full p-2 border rounded bg-gray-200 text-gray-600 font-bold" placeholder="區碼及區域 (自動帶入)">
                        <input type="text" id="address" class="w-full p-2 border rounded focus-primary" placeholder="詳細接送地址">
                        
                        <label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" id="needExtraStop" class="rounded w-4 h-4 quote-trigger"><span>需加點服務</span></label>
                        <div id="extraStopContainer" class="hidden space-y-2 bg-white p-3 border rounded shadow-inner border-purple-200">
                            <input type="text" id="extraZipcode" readonly class="w-full p-2 border rounded bg-gray-200 text-gray-600 font-bold">
                            <input type="text" id="extraStopAddress" class="w-full p-2 border rounded focus-primary" placeholder="加點詳細地址">
                        </div>
                    </div>
                </div>

                <!-- 人數行李 -->
                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h2 class="text-lg font-bold text-primary mb-4 flex items-center"><span class="w-1 h-5 bg-primary mr-2 inline-block rounded"></span>人數與行李</h2>
                    <div class="grid grid-cols-3 gap-2">
                        <select id="paxAdult" class="p-2 border rounded focus-primary pax-calc quote-trigger"></select>
                        <select id="paxChild" class="p-2 border rounded focus-primary pax-calc quote-trigger"></select>
                        <select id="paxInfant" class="p-2 border rounded focus-primary pax-calc quote-trigger"></select>
                    </div>
                    <div id="seatContainer" class="hidden mt-4 p-3 bg-white border border-red-200 rounded shadow-sm">
                        <p class="text-xs text-red-500 font-bold mb-2">※ 4歲以下必選座椅；4-12歲可選配增高墊</p>
                        <div class="grid grid-cols-3 gap-2">
                            <select id="seatRear" class="p-1 border rounded seat-calc quote-trigger"></select>
                            <select id="seatForward" class="p-1 border rounded seat-calc quote-trigger"></select>
                            <select id="seatBooster" class="p-1 border rounded seat-calc quote-trigger"></select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mt-4">
                        <select id="luggageCarry" class="p-2 border rounded focus-primary lug-calc quote-trigger"><option value="0">登機箱 0</option><option value="1">1</option><option value="2">2</option></select>
                        <select id="luggageChecked" class="p-2 border rounded focus-primary lug-calc quote-trigger"><option value="0">托運 0</option></select>
                    </div>
                    <div class="mt-4">
                        <select id="carType" class="w-full p-2 border rounded focus-primary quote-trigger">
                            <option value="小車">小車</option><option value="大車">大車</option><option value="進口商務車(SIENNA/BENZ V)">進口商務車</option><option value="New Alphard 40">New Alphard 40</option>
                        </select>
                        <p id="carWarning" class="text-xs text-red-500 font-bold mt-1 hidden"></p>
                    </div>
                </div>

                <!-- 回程勾選 -->
                <div class="bg-gray-50 p-5 rounded-xl border border-[#f07cad] shadow-sm">
                    <label class="flex items-center space-x-3 cursor-pointer">
                        <input type="checkbox" id="needReturnTrip" class="rounded w-6 h-6 text-[#f07cad] border-gray-300">
                        <span class="text-lg font-bold text-[#f07cad]">同時預約回程</span>
                    </label>
                </div>
                <div id="returnTripContainer" class="hidden">
                    <div class="bg-white p-4 border-2 border-[#f07cad] rounded-xl space-y-4 shadow-sm">
                        <input type="date" id="rideDate_R" class="w-full p-2 border rounded quote-trigger">
                        <div class="flex space-x-2">
                            <select id="rideHour_R" class="w-1/2 p-2 border rounded quote-trigger"></select>
                            <select id="rideMinute_R" class="w-1/2 p-2 border rounded quote-trigger"></select>
                        </div>
                        <input type="text" id="address_R" class="w-full p-2 border rounded" placeholder="回程詳細地址">
                    </div>
                </div>

                <!-- 付款備註 -->
                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm space-y-4">
                    <h2 class="text-lg font-bold text-primary flex items-center"><span class="w-1 h-5 bg-primary mr-2 inline-block rounded"></span>付款與備註</h2>
                    <select id="payment" class="w-full p-2 border rounded focus-primary quote-trigger"><option value="轉帳">轉帳</option><option value="刷卡(限街口/全支付)">刷卡</option></select>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="optSign" value="200" class="quote-trigger"><span>舉牌服務 (+$200)</span></label>
                        <input type="text" id="signContent" class="hidden w-full p-2 border rounded text-sm" placeholder="請輸入舉牌內容">
                    </div>
                    <textarea id="remarks" rows="3" class="w-full p-2 border rounded" placeholder="其他需求..."></textarea>
                </div>

                <!-- 報價 -->
                <div class="bg-[#553f62] p-5 rounded-xl shadow-md text-white">
                    <div id="quoteList" class="text-sm space-y-1 mb-3"></div>
                    <div id="quoteList_R" class="text-sm space-y-1 hidden border-t border-white/20 pt-2 mb-3"></div>
                    <div id="quoteSummary" class="flex justify-between items-center text-lg font-bold border-t-2 border-white/50 pt-3">
                        <span>預估總車資</span>
                        <span id="quoteTotal" class="text-2xl" data-out="0" data-ret="0" data-grand="0" data-out-base="0" data-ret-base="0">$0</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg text-lg">確認送出預約</button>
            </form>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-primary"></div>
        <p class="mt-4 text-primary font-bold">系統載入中...</p>
    </div>

    <script>
        const LIFF_ID = "2009922945-KmKUgqbg";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwguuOcxG_7o5gHauCn5YZVnX0AU6gxhKy5q9jcS7tSeAAOYqPzfYIvhussjteyJMMc/exec"; 
        let priceTable = [], SYSTEM_NEWS = null, extraStopFee = 0, extraStopFee_R = 0;

        function stripTaiwan(s) { return s ? s.replace(/台灣|臺灣/g, "").trim() : ""; }

        async function fetchPriceTable() {
            try {
                const res = await fetch(`${GAS_URL}?action=getPrices&t=${Date.now()}`);
                const data = await res.json();
                if (data && data.prices) {
                    priceTable = data.prices; SYSTEM_NEWS = data.news || "";
                    updateLogic();
                    if (document.getElementById('news-wrapper')) document.getElementById('news-wrapper').innerHTML = SYSTEM_NEWS || "目前無公告";
                }
            } catch (e) { console.error(e); }
        }

        function initFormOptions() {
            let h = '', m = '';
            for(let i=0; i<24; i++) h += `<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;
            for(let i=0; i<60; i+=5) m += `<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}</option>`;
            ['rideHour','rideHour_R'].forEach(id => document.getElementById(id).innerHTML = h);
            ['rideMinute','rideMinute_R'].forEach(id => document.getElementById(id).innerHTML = m);
            
            const adult = document.getElementById('paxAdult'), child = document.getElementById('paxChild'), infant = document.getElementById('paxInfant');
            const render = () => {
                let aV = parseInt(adult.value)||1, cV = parseInt(child.value)||0, iV = parseInt(infant.value)||0;
                let opt = (el, cur, max, min=0) => {
                    let html = '';
                    for(let i=min; i<=max; i++) html += `<option value="${i}" ${i===cur?'selected':''}>${i}位</option>`;
                    el.innerHTML = html;
                };
                opt(adult, aV, 7-cV-iV, 1); opt(child, cV, 7-aV-iV); opt(infant, iV, 7-aV-cV);
            };
            [adult, child, infant].forEach(el => el.addEventListener('change', render));
            render();
        }

        function showNoticeAndForm() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('formContainer').classList.remove('hidden');
            if (!sessionStorage.getItem('hasSeenNotice')) {
                Swal.fire({
                    html: `<div id="swal-news-content" style="max-height:60vh;overflow-y:auto;text-align:left;"><p style="text-align:center;color:#f07cad;font-weight:bold;margin-bottom:15px;">** 請滑至底部點擊「確認送出」 **</p><div id="news-wrapper">${SYSTEM_NEWS || "🔄 載入中..."}</div></div>`,
                    confirmButtonText: '請滑動至底部', confirmButtonColor: '#553f62', allowOutsideClick: false,
                    didOpen: () => {
                        const content = document.getElementById('swal-news-content'), btn = Swal.getConfirmButton();
                        btn.disabled = true; btn.style.opacity = '0.5';
                        const check = () => { if (content.scrollHeight - content.scrollTop <= content.clientHeight + 15) { btn.disabled = false; btn.style.opacity = '1'; btn.innerText = '確認，開始預約'; } };
                        content.addEventListener('scroll', check);
                        let t = setInterval(() => { check(); if(!btn.disabled) clearInterval(t); }, 300);
                    }
                }).then(() => sessionStorage.setItem('hasSeenNotice', 'true'));
            }
        }

        function updateLogic() {
            const outRes = processTripData(''), retRes = document.getElementById('needReturnTrip').checked ? processTripData('_R') : null;
            document.getElementById('quoteList').innerHTML = outRes.html;
            let oTotal = outRes.base + outRes.surcharge, rTotal = retRes ? (retRes.base + retRes.surcharge) : 0;
            let global = document.getElementById('optSign').checked ? 200 : 0;
            document.getElementById('signContent').className = global ? 'w-full p-2 border rounded mt-2 block' : 'hidden';
            let grand = oTotal + rTotal + global - (retRes ? 100 : 0);
            document.getElementById('quoteTotal').innerText = `$${Math.max(0, grand).toLocaleString()}`;
            document.getElementById('quoteTotal').setAttribute('data-out', oTotal + global);
            document.getElementById('quoteTotal').setAttribute('data-ret', rTotal);
            document.getElementById('quoteTotal').setAttribute('data-grand', grand);
            document.getElementById('quoteTotal').setAttribute('data-out-base', outRes.base);
            document.getElementById('quoteTotal').setAttribute('data-ret-base', retRes?retRes.base:0);
            if(retRes) { document.getElementById('quoteList_R').innerHTML = retRes.html; document.getElementById('quoteList_R').classList.remove('hidden'); }
            else document.getElementById('quoteList_R').classList.add('hidden');
        }

        function processTripData(prefix) {
            let adult = parseInt(document.getElementById('paxAdult'+prefix)?.value)||1;
            let child = parseInt(document.getElementById('paxChild'+prefix)?.value)||0;
            let infant = parseInt(document.getElementById('paxInfant'+prefix)?.value)||0;
            let seats = 0;
            if (infant > 0 || child > 0) {
                document.getElementById('seatContainer'+prefix).classList.remove('hidden');
                let r = parseInt(document.getElementById('seatRear'+prefix).value)||0, f = parseInt(document.getElementById('seatForward'+prefix).value)||0, b = parseInt(document.getElementById('seatBooster'+prefix).value)||0;
                seats = r + f + b;
                let rem = (infant + child) - seats;
                const upd = (id, cur) => { let el = document.getElementById(id), h = ''; for(let i=0; i<=cur+rem; i++) h += `<option value="${i}" ${i===cur?'selected':''}>${i}</option>`; el.innerHTML = h; };
                upd('seatRear'+prefix, r); upd('seatForward'+prefix, f); upd('seatBooster'+prefix, b);
            } else document.getElementById('seatContainer'+prefix).classList.add('hidden');

            let base = 0, airport = document.getElementById('airport'+prefix)?.value, zip = document.getElementById('zipcode'+prefix)?.value?.split(' ')[0];
            if (zip && airport) {
                let match = priceTable.find(p => String(p.b).includes(zip) && String(p.a).includes(airport.substring(0,2)));
                let car = document.getElementById('carType'+prefix).value;
                if(match) base = parseInt(car==='小車'?match.d : car==='大車'?match.e : car==='New Alphard 40'?match.g : match.f)||0;
            }
            let surcharge = (document.getElementById('rideType'+prefix).value === '接機' ? 200 : 0) + (seats * 200);
            let html = `<p class="font-bold text-accent">【${prefix?'回程':'去程'}】${airport}</p><p>基本車資: $${base.toLocaleString()}</p>`;
            if(surcharge > 0) html += `<p>└ 加價項目: +$${surcharge}</p>`;
            return { base, surcharge, html };
        }

        function initMapAutocomplete() {
            const bind = (id, zid, prefix) => {
                let ac = new google.maps.places.Autocomplete(document.getElementById(id), { componentRestrictions: { country: "tw" } });
                ac.addListener('place_changed', () => {
                    let p = ac.getPlace();
                    document.getElementById(id).value = stripTaiwan(p.formatted_address);
                    let z = ''; p.address_components.forEach(c => { if(c.types.includes('postal_code')) z = c.long_name; });
                    document.getElementById(zid).value = z + " " + p.formatted_address.match(/(?:縣|市)([^縣市]+?(?:區|市|鎮|鄉))/)?.[1] || "";
                    updateLogic();
                });
            };
            bind('address','zipcode',''); bind('extraStopAddress','extraZipcode','');
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = '傳送中...';
            const hasR = document.getElementById('needReturnTrip').checked;
            const build = (prefix) => {
                return {
                    rideDate: document.getElementById('rideDate'+prefix).value,
                    rideTime: document.getElementById('rideHour'+prefix).value + ":" + document.getElementById('rideMinute'+prefix).value,
                    serviceType: document.getElementById('rideType'+prefix).value,
                    airport: document.getElementById('airport'+prefix).value,
                    address: document.getElementById('address'+prefix).value,
                    extraStop: document.getElementById('needExtraStop'+prefix).checked ? document.getElementById('extraStopAddress'+prefix).value : "",
                    paxNameOnly: document.getElementById('paxName').value + document.getElementById('paxTitle').value,
                    paxPhone: document.getElementById('paxPhone').value,
                    carType: document.getElementById('carType').value,
                    paxCount: `大${document.getElementById('paxAdult').value} 中${document.getElementById('paxChild').value} 小${document.getElementById('paxInfant').value}`,
                    luggageCount: `登機${document.getElementById('luggageCarry').value} 托運${document.getElementById('luggageChecked').value}`,
                    fullMessage: "預約單內容已由系統自動整理於試算表",
                    timestamp: new Date().toLocaleString()
                };
            };
            try {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'addReservation', data: build('') }) });
                if(hasR) await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'addReservation', data: build('_R') }) });
                Swal.fire({ title: '已送出', text: '請等候確認', icon: 'success' }).then(() => window.location.reload());
            } catch (err) { alert("失敗，請洽客服"); btn.disabled = false; }
        });

        window.onload = () => { initFormOptions(); fetchPriceTable(); initializeLiff(); showNoticeAndForm(); };
        async function initializeLiff() { try { await liff.init({ liffId: LIFF_ID }); } catch(e){} }
        document.getElementById('bookingForm').addEventListener('change', updateLogic);
